version: '3.8'

services:
  # 1. UserService
  user-service:
    build:
      context: ./UserService
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "5156:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=${SUPABASE_DB_CONNECTION}
      - MessageBroker__Host=${CLOUDAMQP_HOST}
      - MessageBroker__Username=${CLOUDAMQP_USERNAME}
      - MessageBroker__Password=${CLOUDAMQP_PASSWORD}
      - MessageBroker__VirtualHost=${CLOUDAMQP_VIRTUALHOST}
      - MessageBroker__UseSsl=true
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=UserService
      - Jwt__Audience=UniversityManagement
    deploy:
      resources:
        limits:
          memory: 150M
        reservations:
          memory: 80M
    networks:
      - university-network

  # 2. ClassService
  class-service:
    build:
      context: ./ClassService
      dockerfile: Dockerfile
    container_name: class-service
    ports:
      - "5124:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=${SUPABASE_DB_CONNECTION}
      - MessageBroker__Host=${CLOUDAMQP_HOST}
      - MessageBroker__Username=${CLOUDAMQP_USERNAME}
      - MessageBroker__Password=${CLOUDAMQP_PASSWORD}
      - MessageBroker__VirtualHost=${CLOUDAMQP_VIRTUALHOST}
      - MessageBroker__UseSsl=true
    deploy:
      resources:
        limits:
          memory: 150M
        reservations:
          memory: 80M
    networks:
      - university-network

  # 3. SubjectService
  subject-service:
    build:
      context: ./SubjectService
      dockerfile: Dockerfile
    container_name: subject-service
    ports:
      - "5187:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=${SUPABASE_DB_CONNECTION}
      - MessageBroker__Host=${CLOUDAMQP_HOST}
      - MessageBroker__Username=${CLOUDAMQP_USERNAME}
      - MessageBroker__Password=${CLOUDAMQP_PASSWORD}
      - MessageBroker__VirtualHost=${CLOUDAMQP_VIRTUALHOST}
      - MessageBroker__UseSsl=true
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=UserService
      - Jwt__Audience=UniversityManagement
    deploy:
      resources:
        limits:
          memory: 150M
        reservations:
          memory: 80M
    networks:
      - university-network

  # 4. ScoreService
  score-service:
    build:
      context: ./ScoreService
      dockerfile: Dockerfile
    container_name: score-service
    ports:
      - "5221:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=${SUPABASE_DB_CONNECTION}
      - MessageBroker__Host=${CLOUDAMQP_HOST}
      - MessageBroker__Username=${CLOUDAMQP_USERNAME}
      - MessageBroker__Password=${CLOUDAMQP_PASSWORD}
      - MessageBroker__VirtualHost=${CLOUDAMQP_VIRTUALHOST}
      - MessageBroker__UseSsl=true
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=UserService
      - Jwt__Audience=UniversityManagement
    deploy:
      resources:
        limits:
          memory: 150M
        reservations:
          memory: 80M
    networks:
      - university-network

  # 5. FrontendMVC
  frontend-mvc:
    build:
      context: ./FrontendMVC
      dockerfile: Dockerfile
    container_name: frontend-mvc
    ports:
      - "5281:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Microservices__UserService=http://user-service:8080/api
      - Microservices__ClassService=http://class-service:8080/api
      - Microservices__SubjectService=http://subject-service:8080/api
      - Microservices__ScoreService=http://score-service:8080/api
    deploy:
      resources:
        limits:
          memory: 200M
        reservations:
          memory: 100M
    depends_on:
      - user-service
      - class-service
      - subject-service
      - score-service
    networks:
      - university-network

networks:
  university-network:
    driver: bridge
